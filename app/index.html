<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Project Pulse</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="dashboard">
    <header class="dashboard-header">
      <h1>Project Pulse</h1>
      <p id="timestamp">Loading project data...</p>
    </header>

    <main>
      <section class="kpi-strip" id="kpis" aria-label="Project KPI summary"></section>
      <section class="projects-grid" id="projects" aria-label="Projects"></section>
      <section class="team-section" id="team" aria-label="Team availability"></section>
    </main>
  </div>

  <script>
    const kpiContainer = document.querySelector('#kpis');
    const projectsContainer = document.querySelector('#projects');
    const teamContainer = document.querySelector('#team');
    const timestampElement = document.querySelector('#timestamp');
    const dashboard = document.querySelector('.dashboard');

    const statusLabels = {
      healthy: 'Healthy',
      'at-risk': 'At Risk',
      critical: 'Critical'
    };

    const statusClasses = {
      healthy: 'status-badge--healthy',
      'at-risk': 'status-badge--at-risk',
      critical: 'status-badge--critical'
    };

    const kpiDefinitions = [
      { key: 'activeProjects', label: 'Active Projects' },
      { key: 'onTrack', label: 'On Track' },
      { key: 'atRisk', label: 'At Risk' },
      { key: 'critical', label: 'Critical' },
      { key: 'averageHealth', label: 'Average Health' }
    ];

    function createTextElement(tagName, className, text) {
      const element = document.createElement(tagName);
      if (className) {
        element.className = className;
      }
      element.textContent = text;
      return element;
    }

    function formatPercent(value) {
      const numericValue = Number(value);
      if (!Number.isFinite(numericValue)) {
        return '0%';
      }

      return `${Math.round(numericValue * 100)}%`;
    }

    function normalizeProgress(value) {
      const numericValue = Number(value);
      if (!Number.isFinite(numericValue)) {
        return 0;
      }

      const percentage = numericValue <= 1 ? numericValue * 100 : numericValue;
      return Math.min(100, Math.max(0, percentage));
    }

    function formatKpiValue(key, value) {
      if (key === 'averageHealth') {
        return Number.isFinite(Number(value)) ? `${Number(value).toFixed(1)}` : 'N/A';
      }

      return value ?? 'N/A';
    }

    function formatDateTime(value) {
      const date = value ? new Date(value) : new Date();
      if (Number.isNaN(date.getTime())) {
        return 'Last updated: unavailable';
      }

      return `Last updated: ${date.toLocaleString([], {
        dateStyle: 'medium',
        timeStyle: 'short'
      })}`;
    }

    function renderKpis(kpis) {
      kpiContainer.replaceChildren();

      kpiDefinitions.forEach(({ key, label }) => {
        const card = document.createElement('article');
        card.className = 'kpi-card';

        card.append(
          createTextElement('span', 'kpi-card__label', label),
          createTextElement('strong', 'kpi-card__value', formatKpiValue(key, kpis?.[key]))
        );

        kpiContainer.append(card);
      });
    }

    function renderProjects(projects) {
      projectsContainer.replaceChildren();

      projects.forEach((project) => {
        const card = document.createElement('article');
        card.className = 'project-card';

        const header = document.createElement('div');
        header.className = 'project-card__header';

        const titleGroup = document.createElement('div');
        titleGroup.append(
          createTextElement('h2', 'project-card__title', project.name),
          createTextElement('p', '', `Owner: ${project.owner}`)
        );

        const status = project.status || 'critical';
        const badge = createTextElement(
          'span',
          `status-badge ${statusClasses[status] || statusClasses.critical}`,
          statusLabels[status] || status
        );

        header.append(titleGroup, badge);

        const activity = createTextElement(
          'p',
          'project-card__description',
          `Recent activity: ${project.recentActivity}`
        );

        const priority = createTextElement('p', '', `Priority: ${project.priority}`);
        const health = createTextElement('p', '', `Health score: ${project.healthScore}`);

        const progressBar = document.createElement('div');
        progressBar.className = 'progress-bar';

        const progressFill = document.createElement('div');
        progressFill.className = 'progress-bar__fill';
        progressFill.style.width = `${normalizeProgress(project.progress)}%`;
        progressBar.append(progressFill);

        const progressLabel = document.createElement('div');
        progressLabel.className = 'progress-bar__label';
        progressLabel.append(
          createTextElement('span', '', 'Progress'),
          createTextElement('span', '', formatPercent(project.progress))
        );

        card.append(header, activity, priority, health, progressBar, progressLabel);
        projectsContainer.append(card);
      });
    }

    function renderTeam(team) {
      teamContainer.replaceChildren();
      teamContainer.append(createTextElement('h2', '', 'Team Availability'));

      const teamList = document.createElement('div');
      teamList.className = 'team-list';

      team.forEach((member) => {
        const availability = formatPercent(member.availability);
        const teamMember = createTextElement(
          'div',
          'team-member',
          `${member.name} — ${member.role} — ${availability} available`
        );

        teamList.append(teamMember);
      });

      teamContainer.append(teamList);
    }

    function showError() {
      const errorMessage = createTextElement(
        'div',
        'error-message',
        'We could not load the Project Pulse data. Please refresh the page or try again later.'
      );
      errorMessage.setAttribute('role', 'alert');
      dashboard.insertBefore(errorMessage, dashboard.querySelector('main'));
    }

    fetch('./project-data.json')
      .then((response) => {
        if (!response.ok) {
          throw new Error(`Project data request failed with status ${response.status}`);
        }

        return response.json();
      })
      .then((data) => {
        timestampElement.textContent = formatDateTime(data.generatedAt);
        renderKpis(data.kpis);
        renderProjects(data.projects || []);
        renderTeam(data.team || []);
      })
      .catch((error) => {
        console.error(error);
        timestampElement.textContent = 'Project data unavailable';
        showError();
      });
  </script>
</body>
</html>
